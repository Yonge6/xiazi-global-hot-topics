<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5 小时英语句子记录</title>
  <style>
    :root {
      --paper: #f7f1e6;
      --paper-strong: #fffaf0;
      --ink: #151515;
      --muted: #6b6257;
      --line: rgba(21, 21, 21, 0.16);
      --green: #2f6d55;
      --green-dark: #194836;
      --red: #c85745;
      --yellow: #efc35a;
      --blue: #2c5f8a;
      --shadow: 5px 5px 0 var(--ink);
      --radius: 8px;
      --sans: "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif;
      --serif: Georgia, "Times New Roman", serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(21,21,21,0.045) 1px, transparent 1px),
        linear-gradient(rgba(21,21,21,0.04) 1px, transparent 1px),
        var(--paper);
      background-size: 26px 26px;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button, input, textarea, select {
      font: inherit;
      letter-spacing: 0;
    }

    .site-header {
      position: sticky;
      z-index: 40;
      top: 0;
      border-bottom: 1px solid rgba(21, 21, 21, 0.14);
      background: rgba(247, 241, 230, 0.92);
      backdrop-filter: blur(16px);
    }

    .site-header-shell {
      display: flex;
      width: min(1120px, calc(100% - 28px));
      min-height: 78px;
      align-items: center;
      justify-content: space-between;
      margin: 0 auto;
    }

    .brand-lockup {
      display: inline-flex;
      align-items: center;
    }

    .brand-logo {
      width: 82px;
      height: 64px;
      object-fit: contain;
      object-position: left center;
    }

    .header-right,
    .header-right nav {
      display: flex;
      align-items: center;
    }

    .header-right {
      gap: 34px;
    }

    .header-right nav {
      gap: 30px;
    }

    .header-right nav a,
    .mobile-menu summary,
    .mobile-menu-panel a {
      font-family: "Songti SC", "STSong", Georgia, serif;
    }

    .header-right nav a {
      font-size: 15px;
      transition: color 180ms ease;
    }

    .header-right nav a:hover,
    .header-right nav a.active {
      color: var(--red);
    }

    .mobile-menu {
      display: none;
    }

    .mobile-menu summary {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      gap: 5px;
      list-style: none;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .mobile-menu summary::-webkit-details-marker {
      display: none;
    }

    .mobile-menu summary::marker {
      content: "";
    }

    .mobile-menu summary span {
      color: var(--red);
      font-size: 10px;
      transform: translateY(-1px);
    }

    .mobile-menu-panel {
      position: absolute;
      top: calc(100% + 1px);
      right: max(14px, calc((100vw - min(1120px, calc(100vw - 28px))) / 2));
      display: grid;
      width: min(220px, calc(100vw - 28px));
      overflow: hidden;
      border: 1px solid rgba(21, 21, 21, 0.14);
      background: rgba(255, 250, 240, 0.98);
      box-shadow: 0 18px 42px rgba(21, 21, 21, 0.14);
    }

    .mobile-menu-panel a {
      display: flex;
      min-height: 48px;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(21, 21, 21, 0.08);
      padding: 0 16px;
      font-size: 17px;
      line-height: 1;
    }

    .mobile-menu-panel a:last-child {
      border-bottom: 0;
    }

    .mobile-menu-panel a::after {
      color: var(--yellow);
      content: "↗";
      font-family: Georgia, serif;
      font-size: 12px;
    }

    .mobile-menu-panel a.active {
      background: rgba(200, 87, 69, 0.08);
      color: var(--red);
    }

    .wrap {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 14px 0 38px;
    }

    .top {
      display: grid;
      gap: 10px;
    }

    .wrap > * + * {
      margin-top: 14px;
    }

    .hero,
    .random-panel,
    .manage-panel,
    .record,
    dialog {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: rgba(255, 250, 240, 0.9);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 14px;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr;
      align-items: start;
      gap: 12px;
    }

    .hero:after {
      content: "";
      position: absolute;
      right: -34px;
      bottom: -38px;
      width: 180px;
      height: 140px;
      background:
        linear-gradient(135deg, transparent 42%, rgba(47,109,85,0.2) 42% 52%, transparent 52%),
        linear-gradient(45deg, transparent 40%, rgba(200,87,69,0.18) 40% 50%, transparent 50%);
      transform: rotate(-8deg);
      opacity: 0.45;
    }

    h1 {
      margin: 12px 0 0;
      max-width: 760px;
      font-family: var(--serif);
      font-size: clamp(26px, 3.5vw, 40px);
      line-height: 1.06;
      font-weight: 700;
    }

    .hero p {
      margin: 10px 0 0;
      max-width: 640px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      position: relative;
      z-index: 1;
    }

    .manage-panel {
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: white;
      padding: 9px 10px;
      min-height: 58px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-family: var(--serif);
      font-size: 23px;
      line-height: 1;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hero-controls {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 10px;
    }

    .top-action {
      min-height: 50px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      color: var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .top-action:hover {
      transform: translate(1px, 1px);
      box-shadow: 3px 3px 0 var(--ink);
    }

    .top-action:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 var(--ink);
    }

    .practice-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--yellow);
      text-decoration: none;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 900;
      white-space: nowrap;
    }

    .voice-control {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      padding: 6px 8px;
    }

    .voice-icon {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: var(--yellow);
      font-size: 15px;
      line-height: 1;
    }

    .voice-control select {
      width: min(210px, 42vw);
      min-height: 34px;
      padding: 5px 26px 5px 8px;
      border-width: 0;
      border-radius: 0;
      background: transparent;
      font-size: 13px;
      font-weight: 900;
    }

    .btn,
    .icon-btn {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .btn {
      min-height: 38px;
      padding: 0 12px;
      font-weight: 900;
    }

    .btn.primary {
      background: var(--green);
      color: white;
    }

    .btn.warn {
      background: var(--red);
      color: white;
    }

    .btn:hover,
    .icon-btn:hover {
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 var(--ink);
    }

    .btn:active,
    .icon-btn:active {
      transform: translate(3px, 3px);
      box-shadow: 0 0 0 var(--ink);
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin: 14px 0 10px;
    }

    .section-head.compact {
      margin-top: 10px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 22px;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }

    .records {
      display: grid;
      gap: 14px;
    }

    .random-panel {
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      background:
        linear-gradient(90deg, rgba(239,195,90,0.24), transparent 36%),
        rgba(255, 250, 240, 0.9);
    }

    .random-main {
      min-height: 128px;
      display: grid;
      align-content: center;
    }

    .random-label {
      width: fit-content;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--yellow);
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .random-english {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(20px, 3vw, 30px);
      line-height: 1.25;
    }

    .random-chinese {
      margin: 8px 0 0;
      color: var(--green-dark);
      font-size: 15px;
      line-height: 1.55;
      font-weight: 800;
    }

    .random-source {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .random-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .random-panel.is-shuffling .random-main {
      animation: smoothPick 640ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .random-panel.is-shuffling #randomPickBtn {
      background: var(--yellow);
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 var(--ink);
    }

    @keyframes smoothPick {
      0% { opacity: 1; transform: translateY(0); filter: blur(0); }
      24% { opacity: 0; transform: translateY(10px); filter: blur(4px); }
      44% { opacity: 0; transform: translateY(-10px); filter: blur(4px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    .record {
      overflow: hidden;
    }

    .record-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 2px solid var(--ink);
      background: var(--green);
      color: white;
    }

    .record-time {
      font-weight: 900;
    }

    .record-count {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--yellow);
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .quote-list {
      display: grid;
      gap: 0;
    }

    .quote {
      display: grid;
      grid-template-columns: 50px minmax(0, 1fr);
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.55);
    }

    .quote-actions {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .quote:last-child { border-bottom: 0; }

    .icon-btn {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      font-size: 18px;
      line-height: 1;
      background: var(--yellow);
    }

    .icon-btn.stop {
      background: var(--red);
      color: white;
    }

    .english {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(18px, 2.2vw, 24px);
      line-height: 1.36;
    }

    .translation {
      margin: 8px 0 0;
      color: var(--green-dark);
      font-size: 15px;
      line-height: 1.7;
      font-weight: 700;
    }

    .source {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .empty {
      display: none;
      border: 2px dashed var(--ink);
      border-radius: var(--radius);
      padding: 26px;
      background: rgba(255,250,240,0.75);
      color: var(--muted);
      text-align: center;
      font-weight: 800;
    }

    .site-footer {
      margin-top: 26px;
      border-top: 2px solid var(--ink);
      padding: 18px 0 0;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .footer-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .site-footer a {
      color: var(--ink);
      font-weight: 900;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    dialog {
      width: min(760px, calc(100% - 24px));
      padding: 0;
    }

    #shareDialog {
      width: min(560px, calc(100% - 24px));
    }

    dialog::backdrop {
      background: rgba(21,21,21,0.45);
      backdrop-filter: blur(4px);
    }

    .dialog-head {
      padding: 16px 18px;
      border-bottom: 2px solid var(--ink);
      background: var(--blue);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .dialog-head h3 {
      margin: 0;
      font-size: 18px;
    }

    form {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      font-weight: 900;
      font-size: 13px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: white;
      color: var(--ink);
      padding: 10px 12px;
      resize: vertical;
    }

    textarea {
      min-height: 78px;
      line-height: 1.55;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 4px;
    }

    .share-body {
      padding: 18px;
      background: var(--paper);
    }

    .share-card {
      min-height: 620px;
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(239,195,90,0.26), transparent 35%),
        linear-gradient(315deg, rgba(47,109,85,0.18), transparent 38%),
        var(--paper-strong);
      box-shadow: 7px 7px 0 var(--ink);
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 26px;
    }

    .share-card .share-kicker {
      display: inline-flex;
      width: fit-content;
      border: 2px solid var(--ink);
      border-radius: 999px;
      background: var(--yellow);
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .share-english {
      margin: 18px 0 0;
      font-family: var(--serif);
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.16;
    }

    .share-chinese {
      margin: 18px 0 0;
      color: var(--green-dark);
      font-size: 18px;
      line-height: 1.6;
      font-weight: 800;
    }

    .share-source {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .share-bottom {
      display: flex;
      justify-content: flex-end;
      align-items: end;
      gap: 18px;
      border-top: 2px solid var(--ink);
      padding-top: 18px;
    }

    .share-qr {
      width: 56px;
      height: 56px;
      border: 2px solid var(--ink);
      border-radius: 4px;
      background: white;
      padding: 3px;
      flex: 0 0 auto;
    }

    .share-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .analytics-body {
      padding: 18px;
      display: grid;
      gap: 14px;
      background: var(--paper);
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: white;
      padding: 12px;
      min-height: 86px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-family: var(--serif);
      font-size: 30px;
      line-height: 1;
    }

    .analytics-list {
      border: 2px solid var(--ink);
      border-radius: var(--radius);
      background: white;
      overflow: hidden;
    }

    .analytics-row {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr);
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      line-height: 1.45;
    }

    .analytics-row:last-child {
      border-bottom: 0;
    }

    .analytics-row strong {
      font-weight: 900;
    }

    .analytics-row span {
      color: var(--muted);
    }


    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 820px) {
      .site-header-shell {
        min-height: 66px;
      }

      .brand-logo {
        width: 70px;
        height: 54px;
      }

      .header-right {
        gap: 16px;
      }

      .header-right nav {
        display: none;
      }

      .mobile-menu {
        display: block;
      }

      .mobile-menu-panel {
        right: 14px;
      }

      .hero,
      .random-panel,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .hero-controls {
        align-items: stretch;
      }

      .random-actions {
        justify-content: flex-start;
      }

      .hero:after {
        opacity: 0.45;
      }

      .section-head {
        align-items: start;
        flex-direction: column;
      }

      .section-head p {
        text-align: left;
      }
    }

    @media (max-width: 560px) {
      .quote {
        grid-template-columns: 42px minmax(0, 1fr);
        padding: 14px;
      }

      .icon-btn {
        width: 38px;
        height: 38px;
      }

      .record-head {
        align-items: start;
        flex-direction: column;
      }

      .voice-control {
        min-width: 0;
      }

      .voice-control select {
        width: min(168px, 43vw);
      }

      .share-card {
        min-height: 560px;
        padding: 22px;
      }

      .analytics-grid {
        grid-template-columns: 1fr 1fr;
      }

      .analytics-row {
        grid-template-columns: 1fr;
      }

      .share-bottom {
        align-items: end;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-shell">
      <a class="brand-lockup" href="https://pluto.hk/zh/" aria-label="虾子曰首页">
        <img class="brand-logo" src="../brand/logo/xiazi-global-hot-topics.webp" alt="虾子曰">
      </a>
      <div class="header-right">
        <nav aria-label="虾子曰导航">
          <a href="https://pluto.hk/zh/#stories">昨日世界</a>
          <a href="https://pluto.hk/zh/#archive">往期归档</a>
          <a class="active" href="https://pluto.hk/english-quote-log/" aria-current="page">英语句子</a>
          <a href="https://pluto.hk/zh/#about">关于我们</a>
        </nav>
        <details class="mobile-menu">
          <summary>菜单<span aria-hidden="true">▾</span></summary>
          <div class="mobile-menu-panel">
            <a href="https://pluto.hk/zh/#stories">昨日世界</a>
            <a href="https://pluto.hk/zh/#archive">往期归档</a>
            <a class="active" href="https://pluto.hk/english-quote-log/" aria-current="page">英语句子</a>
            <a href="https://pluto.hk/zh/#about">关于我们</a>
          </div>
        </details>
      </div>
    </div>
  </header>
  <main class="wrap">
    <section class="top" aria-label="页面概览">
      <div class="hero">
        <div class="hero-controls">
          <a class="top-action practice-link" href="https://docs.qq.com/aio/DZHZOWWJHT1F5RGFV" target="_blank" rel="noopener">AI驱动英语听说</a>
          <div class="top-action voice-control" title="选择英文朗读声音">
            <span class="voice-icon" aria-hidden="true">♪</span>

    function loadRecords() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (Array.isArray(saved)) {
          const savedIds = new Set(saved.map((record) => record.id));
          const missingSeedRecords = seedRecords.filter((record) => !savedIds.has(record.id));
          if (missingSeedRecords.length) {
            const merged = [...missingSeedRecords, ...saved];
            localStorage.setItem(STORAGE_KEY, JSON.stringify(merged, null, 2));
            return merged;
          }
          return saved;
        }
      } catch (error) {
        console.warn("Failed to load saved records", error);
      }
      return seedRecords;
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records, null, 2));
    }

    function defaultAnalytics() {
      const now = new Date().toISOString();
      return {
        firstVisit: now,
        lastVisit: now,
        userId: "",
        sessionCount: 0,
        totalDurationSeconds: 0,
        counters: {},
        recent: []
      };
    }

    function loadAnalytics() {
      try {
        const saved = JSON.parse(localStorage.getItem(ANALYTICS_KEY));
        if (saved && typeof saved === "object") {
          return {
            ...defaultAnalytics(),
            ...saved,
            counters: saved.counters && typeof saved.counters === "object" ? saved.counters : {},
            recent: Array.isArray(saved.recent) ? saved.recent : []
          };
        }
      } catch (error) {
        console.warn("Failed to load analytics", error);
      }
      return defaultAnalytics();
    }

    function saveAnalytics(data) {
      localStorage.setItem(ANALYTICS_KEY, JSON.stringify(data));
    }

    function createId(prefix) {
      const value = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      return `${prefix}-${value}`;
    }

    function getVisitorId(data = loadAnalytics()) {
      let visitorId = localStorage.getItem(VISITOR_KEY) || data.userId;
      if (!visitorId) {
        visitorId = createId("visitor");
        localStorage.setItem(VISITOR_KEY, visitorId);
      }
      if (data.userId !== visitorId) {
        data.userId = visitorId;
        saveAnalytics(data);
      }
      return visitorId;
    }

    function getSession() {
      try {
        const saved = JSON.parse(sessionStorage.getItem(SESSION_KEY));
        if (saved && saved.id && saved.startedAt) return saved;
      } catch (error) {
        console.warn("Failed to load session", error);
      }
      return null;
    }

    function saveSession(session) {
      sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
    }

    function globalCounterUrl(name, action = "") {
      const encodedNamespace = encodeURIComponent(GLOBAL_ANALYTICS.namespace);
      const encodedName = encodeURIComponent(name);
      return `${GLOBAL_ANALYTICS.baseUrl}/${encodedNamespace}/${encodedName}/${action}`;
    }

    async function globalCounterGet(name) {
      if (!GLOBAL_ANALYTICS.enabled) return 0;
      try {
        const response = await fetch(globalCounterUrl(name));
        if (!response.ok) return 0;
        const data = await response.json();
        return Number(data.count) || 0;
      } catch (error) {
        console.warn("Failed to read global analytics", error);
        return 0;
      }
    }

    async function globalCounterUp(name) {
      if (!GLOBAL_ANALYTICS.enabled) return 0;
      try {
        const response = await fetch(globalCounterUrl(name, "up"));
        if (!response.ok) return 0;
        const data = await response.json();
        return Number(data.count) || 0;
      } catch (error) {
        console.warn("Failed to update global analytics", error);
        return 0;
      }
    }

    async function globalCounterSet(name, count) {
      if (!GLOBAL_ANALYTICS.enabled) return 0;
      try {
        const response = await fetch(`${globalCounterUrl(name, "set")}?count=${Math.max(0, Math.round(count))}`);
        if (!response.ok) return 0;
        const data = await response.json();
        return Number(data.count) || 0;
      } catch (error) {
        console.warn("Failed to set global analytics", error);
        return 0;
      }
    }

    async function globalCounterAdd(name, delta) {
      if (!delta) return 0;
      const current = await globalCounterGet(name);
      return globalCounterSet(name, current + delta);
    }

    function trackGlobalEvent(type) {
      const counterMap = {
        play: "plays",
        random: "random",
        share: "shares",
        save: "saves",
        copy: "copies",
        add: "adds",
        export: "exports",
        import: "imports",
        reset: "resets",
        voice: "voice_changes"
      };
      const counterName = counterMap[type];
      if (counterName) globalCounterUp(counterName);
    }

    async function ensureGlobalUserNumber() {
      const savedNumber = Number(localStorage.getItem(GLOBAL_USER_NUMBER_KEY));
      if (savedNumber > 0) return savedNumber;
      const userNumber = await globalCounterUp("users");
      if (userNumber > 0) {
        localStorage.setItem(GLOBAL_USER_NUMBER_KEY, String(userNumber));
        localStorage.setItem(GLOBAL_USER_COUNTED_KEY, "1");
      }
      return userNumber;
    }

    async function trackGlobalSession(session) {
      if (!GLOBAL_ANALYTICS.enabled) return;
      const userNumber = await ensureGlobalUserNumber();
      if (userNumber) session.globalUserNumber = userNumber;
      if (!session.globalCounted) {
        globalCounterUp("sessions");
        if (userNumber) {
          globalCounterUp(`user_${userNumber}_sessions`);
          globalCounterSet(`user_${userNumber}_last_session_seconds`, 0);
        }
        session.globalCounted = true;
        saveSession(session);
      }
    }

    async function loadGlobalStats() {
      if (!GLOBAL_ANALYTICS.enabled) return null;
      const names = ["users", "sessions", "duration_seconds", "plays", "random", "shares", "saves"];
      const values = await Promise.all(names.map((name) => globalCounterGet(name)));
      const stats = Object.fromEntries(names.map((name, index) => [name, values[index]]));
      const userCount = Math.min(stats.users || 0, 50);
      const users = await Promise.all(
        Array.from({ length: userCount }, async (_, index) => {
          const number = index + 1;
          const [sessions, totalSeconds, lastSessionSeconds] = await Promise.all([
            globalCounterGet(`user_${number}_sessions`),
            globalCounterGet(`user_${number}_duration_seconds`),
            globalCounterGet(`user_${number}_last_session_seconds`)
          ]);
          return {
            number,
            sessions,
            totalSeconds,
            lastSessionSeconds
          };
        })
      );
      stats.usersDetail = users.filter((user) => user.sessions || user.totalSeconds || user.lastSessionSeconds);
      return stats;
    }

    function startAnalyticsSession() {
      const data = loadAnalytics();
      getVisitorId(data);
      const now = new Date().toISOString();
      let session = getSession();
      if (!session) {
        session = {
          id: createId("session"),
          startedAt: now,
          lastSyncedAt: now
        };
        data.sessionCount = (data.sessionCount || 0) + 1;
        data.counters.visit = (data.counters.visit || 0) + 1;
        data.lastVisit = now;
        data.recent = [
          {
            type: "visit",
            label: analyticsLabels.visit,
            detail: "打开页面",
            at: now
          },
          ...data.recent
        ].slice(0, 80);
        saveAnalytics(data);
      }
      saveSession(session);
      trackGlobalSession(session);
    }

    function syncSessionDuration() {
      const session = getSession();
      if (!session) return;
      const now = new Date();
      const lastSyncedAt = new Date(session.lastSyncedAt || session.startedAt);
      const deltaSeconds = Math.max(0, Math.round((now.getTime() - lastSyncedAt.getTime()) / 1000));
      if (deltaSeconds > 0 && deltaSeconds < 3600) {
        const data = loadAnalytics();
        data.totalDurationSeconds = (data.totalDurationSeconds || 0) + deltaSeconds;
        data.lastVisit = now.toISOString();
        saveAnalytics(data);
        globalCounterAdd("duration_seconds", deltaSeconds);
        const userNumber = session.globalUserNumber || Number(localStorage.getItem(GLOBAL_USER_NUMBER_KEY));
        if (userNumber) {
          globalCounterAdd(`user_${userNumber}_duration_seconds`, deltaSeconds);
          globalCounterSet(`user_${userNumber}_last_session_seconds`, getCurrentSessionSeconds());
        }
      }
      session.lastSyncedAt = now.toISOString();
      saveSession(session);
    }

    function trackEvent(type, detail = "") {
      syncSessionDuration();
      const data = loadAnalytics();
      const now = new Date().toISOString();
      data.lastVisit = now;
      data.counters[type] = (data.counters[type] || 0) + 1;
      data.recent = [
        {
          type,
          label: analyticsLabels[type] || type,
          detail,
          at: now
        },
        ...data.recent
      ].slice(0, 80);
      saveAnalytics(data);
      trackGlobalEvent(type);
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("zh-CN").format(value || 0);
    }

    function formatDuration(seconds = 0) {
      const total = Math.max(0, Math.round(seconds));
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const secs = total % 60;
      if (hours) return `${hours}小时${minutes}分`;
      if (minutes) return `${minutes}分${secs}秒`;
      return `${secs}秒`;
    }

    function getCurrentSessionSeconds() {
      const session = getSession();
      if (!session) return 0;
      return Math.max(0, Math.round((Date.now() - new Date(session.startedAt).getTime()) / 1000));
    }

    function metricTemplate(label, value) {
      return `
        <div class="metric">
          <span>${escapeHtml(label)}</span>
          <strong>${escapeHtml(value)}</strong>
        </div>
      `;
    }

    function renderAnalytics(globalStats = null) {
      syncSessionDuration();
      const data = loadAnalytics();
      const counters = data.counters || {};
      const global = globalStats || {};
      const shareSaveCount = (global.shares ?? counters.share ?? 0) + (global.saves ?? counters.save ?? 0);
      analyticsGrid.innerHTML = [
        metricTemplate("用户人数", formatNumber(global.users ?? (data.userId ? 1 : 0))),
        metricTemplate("使用人次", formatNumber(global.sessions ?? data.sessionCount ?? counters.visit ?? 0)),
        metricTemplate("本次时长", formatDuration(getCurrentSessionSeconds())),
        metricTemplate("合计时长", formatDuration(global.duration_seconds ?? data.totalDurationSeconds ?? 0)),
        metricTemplate("朗读次数", formatNumber(global.plays ?? counters.play)),
        metricTemplate("分享/保存", formatNumber(shareSaveCount))
      ].join("");

      const selectedVoice = voiceSelect.selectedOptions[0]?.textContent || "音色选择";
      const currentUserNumber = Number(localStorage.getItem(GLOBAL_USER_NUMBER_KEY));
      const userRows = (global.usersDetail || []).map((user) => ({
        label: `用户 ${user.number}${user.number === currentUserNumber ? "（我）" : ""}`,
        value: `单次 ${formatDuration(user.lastSessionSeconds)} · 合计 ${formatDuration(user.totalSeconds)} · 人次 ${formatNumber(user.sessions)}`
      }));
      const rows = [
        {
          label: "数据范围",
          value: globalStats ? "公开全站数据 + 当前浏览器明细" : "正在读取全站数据，先显示当前浏览器数据"
        },
        {
          label: "用户明细",
          value: globalStats ? `已区分 ${formatNumber(global.usersDetail?.length || 0)} 个公开用户编号` : "读取中"
        },
        ...userRows,
        {
          label: "当前音色",
          value: selectedVoice
        },
        {
          label: "随机选择",
          value: `${formatNumber(global.random ?? counters.random)} 次`
        },
        {
          label: "句子总数",
          value: `${formatNumber(allQuotes().length)} 句`
        },
        {
          label: "首次访问",
          value: formatTime(data.firstVisit)
        },
        {
          label: "最近访问",
          value: formatTime(data.lastVisit)
        },
        ...data.recent.slice(0, 8).map((event) => ({
          label: event.label,
          value: `${formatTime(event.at)}${event.detail ? ` · ${event.detail}` : ""}`
        }))
      ];

      analyticsList.innerHTML = rows.map((row) => `
        <div class="analytics-row">
          <strong>${escapeHtml(row.label)}</strong>
          <span>${escapeHtml(row.value)}</span>
        </div>
      `).join("");
    }

    function openAnalyticsDialog() {
      renderAnalytics();
      analyticsDialog.showModal();
      loadGlobalStats().then((stats) => {
        renderAnalytics(stats);
      });
    }

    function sortedRecords() {
      return [...records].sort((a, b) => new Date(b.time).getTime() - new Date(a.time).getTime());
    }

    function allQuotes() {
      return sortedRecords().flatMap((record) =>
        record.quotes.map((quote) => ({
          ...quote,
          recordTime: record.time
        }))
      );
    }

    function formatTime(value) {
      return new Intl.DateTimeFormat("zh-CN", {
        dateStyle: "medium",
        timeStyle: "short",
        hour12: false
      }).format(new Date(value));
    }

    function render() {
      const sorted = sortedRecords();
      recordsEl.innerHTML = "";
      emptyStateEl.style.display = sorted.length ? "none" : "block";

      sorted.forEach((record) => {
        const article = document.createElement("article");
        article.className = "record";

        const head = document.createElement("div");
        head.className = "record-head";
        head.innerHTML = `
          <div class="record-time">${escapeHtml(formatTime(record.time))}</div>
          <div class="record-count">${record.quotes.length} sentences</div>
        `;

        const list = document.createElement("div");
        list.className = "quote-list";

        record.quotes.forEach((quote, index) => {
          const row = document.createElement("div");
          row.className = "quote";
          row.innerHTML = `
            <div class="quote-actions">
              <button class="icon-btn play-btn" type="button" title="朗读英文 ${index + 1}" aria-label="朗读英文 ${index + 1}">▶</button>
              <button class="icon-btn share-btn" type="button" title="生成分享图片 ${index + 1}" aria-label="生成分享图片 ${index + 1}">↗</button>
            </div>
            <div>
              <p class="english">${escapeHtml(quote.english)}</p>
              <p class="translation">${escapeHtml(quote.chinese)}</p>
              <p class="source">(${escapeHtml(quote.source)})</p>
            </div>
          `;
          row.querySelector(".play-btn").addEventListener("click", () => speakEnglish(quote.english, "列表句子"));
          row.querySelector(".share-btn").addEventListener("click", () => openShareDialog(quote));
          list.appendChild(row);
        });

        article.append(head, list);
        recordsEl.appendChild(article);
      });
      refreshRandomQuoteIfNeeded();
    }

    function pickRandomQuote(excludedQuote = null) {
      const quotes = allQuotes();
      if (!quotes.length) return null;
      if (quotes.length === 1) return quotes[0];
      const pool = excludedQuote
        ? quotes.filter((quote) => quote.english !== excludedQuote.english || quote.source !== excludedQuote.source)
        : quotes;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function renderRandomQuote(quote) {
      activeRandomQuote = quote;
      const hasQuote = Boolean(quote);
      randomPanel.style.display = hasQuote ? "grid" : "none";
      randomPlayBtn.disabled = !hasQuote;
      randomShareBtn.disabled = !hasQuote;
      if (!hasQuote) return;
      randomEnglish.textContent = quote.english;
      randomChinese.textContent = quote.chinese;
      randomSource.textContent = `(${quote.source})`;
    }

    function refreshRandomQuoteIfNeeded() {
      const quotes = allQuotes();
      if (!quotes.length) {
        renderRandomQuote(null);
        return;
      }
      const stillExists = activeRandomQuote && quotes.some((quote) =>
        quote.english === activeRandomQuote.english && quote.source === activeRandomQuote.source
      );
      if (!stillExists) renderRandomQuote(pickRandomQuote());
    }

    function shuffleRandomQuote() {
      const quotes = allQuotes();
      if (!quotes.length) return;
      trackEvent("random", "随机练一句");
      randomPickBtn.disabled = true;
      randomPanel.classList.add("is-shuffling");
      window.setTimeout(() => {
        renderRandomQuote(pickRandomQuote(activeRandomQuote));
      }, 180);
      window.setTimeout(() => {
        randomPanel.classList.remove("is-shuffling");
        randomPickBtn.disabled = false;
      }, 640);
    }

    function isEnglishVoice(voice) {
      return voice.lang && voice.lang.toLowerCase().startsWith("en");
    }

    function getVoiceProfile(voice) {
      const name = voice.name.toLowerCase();
      return preferredVoiceProfiles.find((profile) =>
        profile.match.some((word) => name.includes(word))
      ) || null;
    }

    function scoreVoice(voice) {
      const name = voice.name.toLowerCase();
      const lang = voice.lang.toLowerCase();
      const profile = getVoiceProfile(voice);
      let score = 0;
      if (lang === "en-us") score += 90;
      else if (lang === "en-gb") score += 62;
      else if (lang.startsWith("en-")) score += 44;
      if (profile) score += 220 - profile.rank * 8;
      if (name.includes("online") || name.includes("natural")) score += 42;
      if (name.includes("premium") || name.includes("enhanced")) score += 32;
      if (name.includes("neural")) score += 28;
      if (name.includes("compact")) score -= 60;
      if (name.includes("default")) score -= 28;
      if (name.includes("eloquence") || name.includes("novelty")) score -= 90;
      if (voice.localService) score += 4;
      return score;
    }

    function getVoiceCandidates() {
      const seen = new Set();
      const sorted = voices
        .filter(isEnglishVoice)
        .sort((a, b) => scoreVoice(b) - scoreVoice(a) || a.name.localeCompare(b.name))
        .filter((voice) => {
          const key = `${voice.name}-${voice.lang}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      const selected = [];
      ["女声", "男声"].forEach((gender) => {
        sorted
          .filter((voice) => getVoiceProfile(voice)?.gender === gender)
          .slice(0, 3)
          .forEach((voice) => {
            if (!selected.includes(voice) && selected.length < 7) selected.push(voice);
          });
      });
      sorted.forEach((voice) => {
        if (!selected.includes(voice) && selected.length < 7) selected.push(voice);
      });
      return selected;
    }

    function formatVoiceOption(voice, index) {
      const profile = getVoiceProfile(voice);
      const label = profile ? `${profile.gender} · ${profile.accent}` : voice.lang;
      return `音色 ${index + 1} · ${label} · ${voice.name}`;
    }

    function getBestVoice() {
      const savedName = localStorage.getItem(VOICE_KEY);
      const candidates = getVoiceCandidates();
      const saved = candidates.find((voice) => voice.name === savedName);
      if (saved) return saved;
      return candidates[0] || null;
    }

    function populateVoices() {
      if (!("speechSynthesis" in window)) {
        voiceSelect.disabled = true;
        return;
      }
      voices = window.speechSynthesis.getVoices().filter(isEnglishVoice);
      const savedName = localStorage.getItem(VOICE_KEY);
      const candidates = getVoiceCandidates();
      voiceSelect.innerHTML = '<option value="">音色选择</option>';

      candidates.forEach((voice, index) => {
        const option = document.createElement("option");
        option.value = voice.name;
        option.textContent = formatVoiceOption(voice, index);
        voiceSelect.appendChild(option);
      });

      if (savedName && candidates.some((voice) => voice.name === savedName)) {
        voiceSelect.value = savedName;
      } else {
        localStorage.removeItem(VOICE_KEY);
        voiceSelect.value = "";
      }
    }

    function speakEnglish(text, detail = "") {
      if (!("speechSynthesis" in window)) {
        alert("当前浏览器不支持朗读。请用 Chrome、Safari 或 Edge 打开。");
        return;
      }
      trackEvent("play", detail);
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.9;
      utterance.pitch = 1;
      utterance.volume = 1;
      const voice = getBestVoice();
      if (voice) utterance.voice = voice;
      window.speechSynthesis.speak(utterance);
    }

    function openShareDialog(quote) {
      activeShareQuote = quote;
      trackEvent("share", quote.source);
      shareEnglish.textContent = quote.english;
      shareChinese.textContent = quote.chinese;
      shareSource.textContent = `(${quote.source})`;
      shareQr.src = makeQrDataUrl(PAGE_URL, 2);
      shareDialog.showModal();
    }

    function closeShareDialog() {
      shareDialog.close();
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.left = "-9999px";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand("copy");
        textarea.remove();
      }
    }

    function shareQuoteText() {
      if (!activeShareQuote) return "";
      return [
        activeShareQuote.english,
        activeShareQuote.chinese,
        `(${activeShareQuote.source})`,
        PAGE_URL
      ].join("\n");
    }

    function makeQrDataUrl(text, cellSize = 4) {
      if (typeof qrcode !== "function") return "";
      const qr = qrcode(0, "M");
      qr.addData(text);
      qr.make();
      return qr.createDataURL(cellSize, 0);
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = reject;
        image.src = src;
      });
    }

    function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 8) {
      const tokens = /\s/.test(text) ? text.split(/(\s+)/).filter(Boolean) : [...text];
      const lines = [];
      let line = "";
      tokens.forEach((token) => {
        const test = line + token;
        if (ctx.measureText(test).width > maxWidth && line.trim()) {
          lines.push(line.trim());
          line = token.trimStart();
        } else {
          line = test;
        }
      });
      if (line.trim()) lines.push(line.trim());

      lines.slice(0, maxLines).forEach((item, index) => {
        const suffix = lines.length > maxLines && index === maxLines - 1 ? "..." : "";
        ctx.fillText(item + suffix, x, y + index * lineHeight);
      });
      return y + Math.min(lines.length, maxLines) * lineHeight;
    }

    async function saveShareImage() {
      if (!activeShareQuote) return;
      if (typeof qrcode !== "function") {
        alert("二维码组件还没加载完成，请稍后再试。");
        return;
      }
      const canvas = document.createElement("canvas");
      canvas.width = 1080;
      canvas.height = 1350;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#fffaf0";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(239,195,90,0.26)";
      ctx.fillRect(0, 0, canvas.width, 210);
      ctx.fillStyle = "rgba(47,109,85,0.14)";
      ctx.fillRect(canvas.width - 230, canvas.height - 250, 230, 250);

      ctx.strokeStyle = "#151515";
      ctx.lineWidth = 8;
      ctx.strokeRect(54, 54, canvas.width - 108, canvas.height - 108);

      ctx.fillStyle = "#efc35a";
      ctx.strokeStyle = "#151515";
      ctx.lineWidth = 5;
      roundRect(ctx, 90, 92, 310, 58, 29, true, true);
      ctx.fillStyle = "#151515";
      ctx.font = "700 24px Avenir Next, PingFang SC, sans-serif";
      ctx.fillText("English Quote Log", 114, 130);

      ctx.fillStyle = "#151515";
      ctx.font = "700 64px Georgia, Times New Roman, serif";
      let y = wrapCanvasText(ctx, activeShareQuote.english, 90, 270, 880, 78, 7);

      ctx.fillStyle = "#194836";
      ctx.font = "700 38px PingFang SC, Microsoft YaHei, sans-serif";
      y = wrapCanvasText(ctx, activeShareQuote.chinese, 90, y + 60, 880, 56, 4);

      ctx.fillStyle = "#6b6257";
      ctx.font = "500 28px Avenir Next, PingFang SC, sans-serif";
      wrapCanvasText(ctx, `(${activeShareQuote.source})`, 90, y + 44, 780, 40, 3);

      ctx.strokeStyle = "#151515";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(90, 1154);
      ctx.lineTo(990, 1154);
      ctx.stroke();

      const qrImage = await loadImage(makeQrDataUrl(PAGE_URL, 8));
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#151515";
      ctx.lineWidth = 5;
      roundRect(ctx, 840, 1170, 120, 120, 8, true, true);
      ctx.drawImage(qrImage, 850, 1180, 100, 100);
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
      if (!blob) return;
      const file = new File([blob], `english-quote-${Date.now()}.png`, { type: "image/png" });
      trackEvent("save", activeShareQuote.source);
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: "English Quote Log",
            text: "保存这张英语句子分享图"
          });
          return;
        } catch (error) {
          if (error.name === "AbortError") return;
        }
      }

      const link = document.createElement("a");
      link.download = file.name;
      link.href = URL.createObjectURL(blob);
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      if (fill) ctx.fill();
      if (stroke) ctx.stroke();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function toLocalDateTimeValue(date = new Date()) {
      const local = new Date(date.getTime() - date.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 16);
    }

    function openDialog() {
      document.querySelector("#recordTime").value = toLocalDateTimeValue();
      form.reset();
      document.querySelector("#recordTime").value = toLocalDateTimeValue();
      dialog.showModal();
    }

    function closeDialog() {
      dialog.close();
      form.reset();
    }

    function formValue(id) {
      return document.querySelector(id).value.trim();
    }

    function handleSubmit(event) {
      event.preventDefault();
      const timeValue = formValue("#recordTime");
      const next = {
        id: `record-${Date.now()}`,
        time: new Date(timeValue).toISOString(),
        quotes: [1, 2, 3].map((number) => ({
          english: formValue(`#english${number}`),
          chinese: formValue(`#chinese${number}`),
          source: formValue(`#source${number}`)
        }))
      };
      records = [next, ...records];
      saveRecords();
      trackEvent("add", formatTime(next.time));
      render();
      closeDialog();
    }

    function exportRecords() {
      trackEvent("export", `${records.length} 组记录`);
      const blob = new Blob([JSON.stringify(sortedRecords(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "english-quote-log.json";
      link.click();
      URL.revokeObjectURL(url);
    }

    function importRecords(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!Array.isArray(imported)) throw new Error("JSON must be an array");
          records = imported;
          saveRecords();
          trackEvent("import", `${records.length} 组记录`);
          render();
        } catch (error) {
          alert("导入失败：文件格式不正确。");
        }
      };
      reader.readAsText(file);
    }

    function resetRecords() {
      if (!confirm("确定重置为初始记录吗？")) return;
      records = seedRecords;
      saveRecords();
      trackEvent("reset", `${seedRecords.length} 组初始记录`);
      render();
    }

    document.querySelector("#addRecordBtn").addEventListener("click", openDialog);
    document.querySelector("#closeDialogBtn").addEventListener("click", closeDialog);
    document.querySelector("#closeShareBtn").addEventListener("click", closeShareDialog);
    document.querySelector("#analyticsBtn").addEventListener("click", openAnalyticsDialog);
    document.querySelector("#closeAnalyticsBtn").addEventListener("click", () => analyticsDialog.close());
    document.querySelector("#cancelBtn").addEventListener("click", closeDialog);
    document.querySelector("#exportBtn").addEventListener("click", exportRecords);
    document.querySelector("#importBtn").addEventListener("click", () => importFile.click());
    document.querySelector("#resetBtn").addEventListener("click", resetRecords);
    document.querySelector("#saveShareImageBtn").addEventListener("click", saveShareImage);
    document.querySelector("#copyQuoteBtn").addEventListener("click", () => {
      trackEvent("copy", activeShareQuote?.source || "");
      copyText(shareQuoteText());
    });
    randomPickBtn.addEventListener("click", shuffleRandomQuote);
    randomPlayBtn.addEventListener("click", () => {
      if (activeRandomQuote) speakEnglish(activeRandomQuote.english, "随机句子");
    });
    randomShareBtn.addEventListener("click", () => {
      if (activeRandomQuote) openShareDialog(activeRandomQuote);
    });
    voiceSelect.addEventListener("change", () => {
      if (voiceSelect.value) localStorage.setItem(VOICE_KEY, voiceSelect.value);
      else localStorage.removeItem(VOICE_KEY);
      trackEvent("voice", voiceSelect.selectedOptions[0]?.textContent || "音色选择");
    });
    importFile.addEventListener("change", (event) => {
      const [file] = event.target.files;
      if (file) importRecords(file);
      event.target.value = "";
    });
    form.addEventListener("submit", handleSubmit);

    startAnalyticsSession();
    window.setInterval(() => {
      if (!document.hidden) syncSessionDuration();
    }, 15000);
    document.addEventListener("visibilitychange", syncSessionDuration);
    window.addEventListener("pagehide", syncSessionDuration);
    populateVoices();
    if ("speechSynthesis" in window) {
      window.speechSynthesis.addEventListener("voiceschanged", populateVoices);
    }
    render();
  </script>
</body>
</html>
